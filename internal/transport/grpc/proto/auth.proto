syntax = "proto3";

package authgrpc;

option go_package = "github.com/Prashant2307200/auth-service/internal/transport/grpc/proto;authgrpc";

service TokenService {
  rpc VerifyToken(VerifyTokenRequest) returns (VerifyTokenResponse) {}
}

message VerifyTokenRequest {
  string token = 1;
  int64 tenant_id = 2;
}

message VerifyTokenResponse {
  int64 user_id = 1;
  string role = 2;
}
