name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Verify go.mod is clean
        run: go mod tidy && git diff --exit-code

      - name: Run go fmt
        run: |
          output=$(gofmt -l .)
          if [ -n "$output" ]; then echo "Files not formatted:" && echo "$output" && exit 1; fi
      - name: Run go vet
        run: go vet ./...
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: v1.59.0
          args: --timeout 5m

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Verify go.mod is clean
        run: go mod tidy && git diff --exit-code
      - name: Run tests
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic
      - name: Check coverage
        run: |
          go tool cover -func=coverage.out | tail -1
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          threshold=65
          echo \"Coverage total: $total% (threshold $threshold%)\"
          # Compare as integers to avoid float dependency
          total_int=${total%.*}
          if [ -z \"$total_int\" ] || [ \"$total_int\" -lt \"$threshold\" ]; then
            echo \"Coverage $total% is below threshold of ${threshold}%\" && exit 1
          fi
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Verify go.mod is clean
        run: go mod tidy && git diff --exit-code
      - name: Build
        run: go build -o auth-service ./cmd/main/

  integration:
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: auth_db
          POSTGRES_USER: auth_user
          POSTGRES_PASSWORD: auth_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auth_user -d auth_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Run integration tests (integration tag and handler suite)
        env:
          INTEGRATION_POSTGRES_URI: postgresql://auth_user:auth_password@localhost:5432/auth_db?sslmode=disable
          INTEGRATION_REDIS_ADDRESS: localhost:6379
          INTEGRATION_REDIS_USERNAME: ""
          INTEGRATION_REDIS_PASSWORD: ""
        run: |
          # Run all tests that include 'Integration' in their name across the repo.
          go test ./... -run Integration -count=1 -v
