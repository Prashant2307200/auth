version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - auth-network

  redis:
    image: redis:7-alpine
    container_name: auth-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - auth-network

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8080:8080"
    environment:
      # Config path
      CONFIG_PATH: /app/config/docker.yaml
      
      # Database
      POSTGRES_URI: "postgresql://auth_user:auth_password@postgres:5432/auth_db?sslmode=disable"
      
      # Redis
      REDIS_ADDRESS: "redis:6379"
      REDIS_USERNAME: ""
      REDIS_PASSWORD: ""
      
      # Environment
      ENV: "dev"
      
      # Secrets - set via env or replace with real values for production
      ACCESS_TOKEN_SECRET: "${ACCESS_TOKEN_SECRET:-change-me}"
      REFRESH_TOKEN_SECRET: "${REFRESH_TOKEN_SECRET:-change-me}"
      COOKIE_SECRET: "${COOKIE_SECRET:-change-me}"
      
      # Cloudinary - set via env or replace for production
      NAME: "${NAME:-change-me}"
      API_KEY: "${API_KEY:-change-me}"
      API_SECRET: "${API_SECRET:-change-me}"
    volumes:
      - ./config:/app/config:ro
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auth-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  auth-network:
    driver: bridge